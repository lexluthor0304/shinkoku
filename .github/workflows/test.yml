name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff (pre-commit)
        run: uv run pre-commit run --all-files

      - name: Mypy type check
        run: uv run mypy src/shinkoku/ --ignore-missing-imports

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Unit tests
        run: uv run pytest tests/unit/ -v --tb=short

      - name: Integration tests
        run: uv run pytest tests/integration/ -v --tb=short || test $? -eq 5

  version-check:
    name: Version Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version bump is needed
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"

          # src/ または skills/ の変更を検出（tests/, .github/, *.md, Makefile は除外）
          CHANGED=$(git diff --name-only "$BASE_SHA"...HEAD -- \
            'src/shinkoku/' 'skills/' \
            ':!tests/' ':!.github/' ':!*.md' ':!Makefile')

          if [ -z "$CHANGED" ]; then
            echo "No source/skill changes detected — version bump not required."
            exit 0
          fi

          echo "Source/skill changes detected:"
          echo "$CHANGED"

          # marketplace.json のバージョンがベースから更新されているか
          BASE_MKT_VER=$(git show "$BASE_SHA":.claude-plugin/marketplace.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          print(data['plugins'][0]['version'])
          ")
          HEAD_MKT_VER=$(python3 -c "
          import json
          with open('.claude-plugin/marketplace.json') as f:
              data = json.load(f)
          print(data['plugins'][0]['version'])
          ")

          if [ "$BASE_MKT_VER" = "$HEAD_MKT_VER" ]; then
            echo "::error::marketplace.json version ($HEAD_MKT_VER) was not updated. Bump the version when changing src/ or skills/."
            exit 1
          fi

          # pyproject.toml と marketplace.json のバージョンが一致するか
          PYPROJECT_VER=$(python3 -c "
          import re
          with open('pyproject.toml') as f:
              for line in f:
                  m = re.match(r'version\s*=\s*\"(.+?)\"', line)
                  if m:
                      print(m.group(1))
                      break
          ")

          if [ "$PYPROJECT_VER" != "$HEAD_MKT_VER" ]; then
            echo "::error::Version mismatch: pyproject.toml=$PYPROJECT_VER, marketplace.json=$HEAD_MKT_VER. Keep them in sync."
            exit 1
          fi

          echo "Version check passed: $HEAD_MKT_VER"

  coverage:
    name: Coverage
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        run: uv run pytest tests/ --cov=shinkoku --cov-report=xml --cov-report=term-missing

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
